<div class="min-h-screen bg-slate-950 text-slate-100 antialiased font-sans selection:bg-violet-500 selection:text-white pb-12">
  <!-- Glowing Background Orbs -->
  <div class="absolute top-0 left-1/4 w-96 h-96 bg-violet-600/10 rounded-full blur-3xl pointer-events-none"></div>
  <div class="absolute top-1/3 right-1/4 w-96 h-96 bg-indigo-600/10 rounded-full blur-3xl pointer-events-none"></div>

  <header class="sticky top-0 z-50 backdrop-blur-md bg-slate-950/80 border-b border-slate-900">
    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
      <!-- Logo Brand -->
      <a routerLink="/" class="flex items-center gap-2 group">
        <span class="text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-violet-500 to-indigo-400 group-hover:from-violet-400 group-hover:to-indigo-300 transition duration-300">
          GameKey
        </span>
        <span class="px-2 py-0.5 rounded bg-violet-500/10 text-violet-400 border border-violet-500/20 font-bold text-xs uppercase tracking-widest">
          Store
        </span>
      </a>

      <!-- Navigation Links -->
      <nav class="flex items-center gap-6">
        <a 
          routerLink="/games" 
          routerLinkActive="text-violet-455 border-violet-500" 
          [routerLinkActiveOptions]="{exact: true}"
          class="text-sm font-semibold text-slate-300 hover:text-white py-5 border-b-2 border-transparent transition-all duration-200">
          Catalog Inventory
        </a>
        <a 
          routerLink="/games/add" 
          routerLinkActive="text-violet-455 border-violet-500" 
          class="text-sm font-semibold text-slate-300 hover:text-white py-5 border-b-2 border-transparent transition-all duration-200">
          Add Game
        </a>
      </nav>
    </div>
  </header>

  <!-- Router Viewport Containment Area -->
  <main class="relative z-10 max-w-6xl mx-auto px-4 mt-6">
    <router-outlet></router-outlet>
  </main>
</div>
